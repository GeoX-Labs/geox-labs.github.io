<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX</title>
    <link rel="stylesheet" href="utils/style.css">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0KOVEMckDpbOc7ymOqrASbfYd5H6zB4AoAuzP9SPQPUQUfjsd4ztd" crossorigin="anonymous">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header>
        <div class="header-top">
            <a href="index.html" aria-label="GX home">
                <img src="assets/geox_black.png" alt="GeoX Logo" class="logo-light">
                <img src="assets/geox_white.png" alt="GeoX Logo" class="logo-dark">
            </a>
            <button id="theme-toggle" class="theme-toggle-button" aria-label="Toggle theme">
                <i class="fa-solid fa-moon"></i>
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>
        <div class="social-icons">
            <a href="#" aria-label="Twitter / X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
            <a href="#" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>

        <div class="nav-links">
            <a href="pages/about.html">About</a>
            <a href="pages/background.html">Background</a>
            <a href="pages/demos.html">Demos</a>
            <a href="pages/team.html">Team</a>
        </div>

    </header>

    <main>

        <div class="toc-heading">
            <a href="textbook/textbook.pdf" class="download-btn" download>
                <i class="fa-solid fa-book"></i>
                The Geometry of Deep Learning
            </a>
        </div>
        
        <div class="centered">
            <img src="assets/grokalign_gif.gif" alt="Funny animation" width="400" height="400">
        </div>

    </main>

    <script src="utils/script.js"></script>

    <!-- KaTeX JS and auto-render extension -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true}, // For display mode (centered on its own line)
                    {left: '$', right: '$', display: false}   // For inline mode
                ]
            });
        });
    </script>
</body>
</html>
